name: 369 V3 CI

on:
  push:
    branches:
      - main
      - fix/live-audit-blockers
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python and dashboard tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Environment
        run: |
          python --version
          node --version
          find app tests tools -maxdepth 2 -type f | sort

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Python compile
        run: python -m compileall -q app tools

      - name: Engine regression tests
        run: python -m pytest -vv

      - name: Dashboard JavaScript syntax
        run: |
          node --check app/static/app.js
          node --check app/static/audit_patch.js
